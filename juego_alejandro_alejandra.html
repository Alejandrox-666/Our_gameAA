<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Cartas — Alejandro & Alejandra</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9952A;
    --gold-light: #E8C060;
    --gold-dark: #8B6514;
    --navy: #1a2540;
    --navy-light: #243054;
    --card-bg: #0d1526;
    --text-light: #f0e6c8;
    --text-muted: #9a8a6a;
    --radius: 16px;
  }
  body {
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #0a0f1e 0%, #1a2540 50%, #0d1020 100%);
    min-height: 100vh;
    color: var(--text-light);
    padding: 1.5rem 1rem 3rem;
  }
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header-logo {
    width: 80px; height: 80px;
    object-fit: contain;
    margin-bottom: 0.5rem;
    filter: drop-shadow(0 0 12px rgba(201,149,42,0.5));
  }
  .header h1 {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--gold-light);
    text-transform: uppercase;
  }
  .header p {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .scoreboard {
    display: flex; gap: 12px; margin-bottom: 1.25rem; max-width: 480px; margin-left: auto; margin-right: auto;
  }
  .score-card {
    flex: 1; border-radius: var(--radius);
    border: 1px solid var(--gold-dark);
    background: rgba(201,149,42,0.07);
    padding: 0.75rem 1rem; text-align: center;
    transition: all 0.3s ease;
  }
  .score-card.active {
    border: 2px solid var(--gold);
    background: rgba(201,149,42,0.18);
    box-shadow: 0 0 18px rgba(201,149,42,0.25);
  }
  .score-name { font-size: 11px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
  .score-num { font-size: 26px; color: var(--gold-light); }
  .score-card.active .score-name { color: var(--gold); }
  .score-card.active .score-num { color: var(--gold-light); }

  .turn-label {
    font-size: 13px; color: var(--text-muted);
    text-align: center; margin-bottom: 1.25rem; letter-spacing: 0.05em;
  }
  .turn-label span { color: var(--gold-light); }

  .filter-row {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem;
  }
  .filter-btn {
    font-size: 11px; padding: 5px 14px; border-radius: 99px;
    border: 1px solid var(--gold-dark);
    background: transparent;
    color: var(--text-muted); cursor: pointer;
    letter-spacing: 0.08em; text-transform: uppercase;
    font-family: 'Georgia', serif;
    transition: all 0.2s;
  }
  .filter-btn.on { font-weight: 700; }
  .filter-btn.on.cat-recuerdo { background: rgba(83,74,183,0.25); color: #b0a8f0; border-color: #534AB7; }
  .filter-btn.on.cat-picante  { background: rgba(212,83,126,0.2); color: #f0a0c0; border-color: #D4537E; }
  .filter-btn.on.cat-divertida{ background: rgba(186,117,23,0.25); color: #f0c878; border-color: #BA7517; }
  .filter-btn.on.cat-profunda { background: rgba(24,95,165,0.25); color: #90c0f0; border-color: #185FA5; }

  .deck-area {
    position: relative; height: 300px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.5rem;
  }
  .card {
    width: 280px; height: 270px;
    border-radius: var(--radius);
    border: 1px solid var(--gold-dark);
    background: var(--card-bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem; text-align: center;
    position: absolute;
    transition: transform 0.15s ease;
  }
  .card-stack-2 { transform: rotate(-4deg) translateY(6px); background: #0a1020; border-color: #6a5010; }
  .card-stack-1 { transform: rotate(2.5deg) translateY(3px); background: #0c1222; border-color: #8B6514; }

  .card-back {
    cursor: pointer;
    border: 2px solid var(--gold-dark);
    background: radial-gradient(ellipse at center, #1a2540 0%, #0d1020 100%);
  }
  .card-back:hover { transform: scale(1.03) translateY(-3px); }
  .card-back-logo {
    width: 90px; height: 90px; object-fit: contain; margin-bottom: 10px;
    filter: drop-shadow(0 0 8px rgba(201,149,42,0.4));
  }
  .card-back-text { font-size: 12px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }

  .card-front { cursor: default; border: 1px solid var(--gold-dark); }

  .card-header {
    display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .card-logo-sm {
    width: 42px; height: 42px; object-fit: contain;
    filter: drop-shadow(0 0 5px rgba(201,149,42,0.35));
  }
  .category-badge {
    font-size: 10px; font-weight: 700; padding: 3px 12px;
    border-radius: 99px; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .cat-recuerdo { background: rgba(83,74,183,0.25); color: #b0a8f0; border: 1px solid #534AB7; }
  .cat-picante   { background: rgba(212,83,126,0.2); color: #f0a0c0; border: 1px solid #D4537E; }
  .cat-divertida { background: rgba(186,117,23,0.25); color: #f0c878; border: 1px solid #BA7517; }
  .cat-profunda  { background: rgba(24,95,165,0.25); color: #90c0f0; border: 1px solid #185FA5; }

  .card-divider {
    width: 60%; height: 1px; background: var(--gold-dark); margin-bottom: 14px; opacity: 0.5;
  }
  .card-question { font-size: 14px; color: var(--text-light); line-height: 1.6; }

  .remaining {
    font-size: 11px; color: var(--text-muted);
    text-align: center; margin-bottom: 1rem; letter-spacing: 0.1em;
  }

  .actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .btn-reveal {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #0a0f1e; border: none; border-radius: 99px;
    padding: 11px 32px; font-size: 13px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;
    font-family: 'Georgia', serif;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-reveal:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-pass, .btn-check {
    border-radius: 99px; padding: 11px 22px; font-size: 13px;
    cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase;
    font-family: 'Georgia', serif; border: 1px solid var(--gold-dark);
    background: transparent; color: var(--text-muted);
    transition: all 0.15s;
  }
  .btn-check { border-color: var(--gold); color: var(--gold-light); }
  .btn-pass:hover { border-color: var(--text-muted); color: var(--text-light); }
  .btn-check:hover { background: rgba(201,149,42,0.15); }

  .empty-state { text-align: center; color: var(--text-muted); font-size: 15px; padding: 2rem; }
  .fade-in { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .ornament { color: var(--gold-dark); font-size: 18px; letter-spacing: 0.3em; text-align: center; margin-bottom: 0.5rem; opacity: 0.5; }
</style>
</head>

const CAT_LABELS = { recuerdo:'Recuerdos', picante:'Picante', divertida:'Divertida', profunda:'Profunda' };
const NAMES = ['Alejandro','Alejandra'];
let filters = { recuerdo:true, picante:true, divertida:true, profunda:true };
let deck=[], current=null, revealed=false, turn=0, scores=[0,0];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildDeck(){ deck=shuffle(ALL_CARDS.filter(c=>filters[c.cat])); current=null; revealed=false; render(); }
function revealCard(){ if(revealed||deck.length===0)return; current=deck.pop(); revealed=true; render(); }
function nextCard(scored){ if(scored)scores[turn]++; turn=(turn+1)%2; current=null; revealed=false; render(); }
function toggleFilter(cat){
  const on=Object.values(filters).filter(Boolean).length;
  if(filters[cat]&&on===1)return;
  filters[cat]=!filters[cat]; buildDeck();
}
function render(){
  document.getElementById('score-p1').textContent=scores[0];
  document.getElementById('score-p2').textContent=scores[1];
  document.getElementById('turn-name').textContent=NAMES[turn];
  document.getElementById('card-p1').className='score-card'+(turn===0?' active':'');
  document.getElementById('card-p2').className='score-card'+(turn===1?' active':'');
  const total=deck.length+(current?1:0);
  document.getElementById('remaining').textContent='✦  '+total+' cartas restantes de 200  ✦';
  const area=document.getElementById('deck-area');
  const acts=document.getElementById('actions');

  if(!revealed&&total===0){
    area.innerHTML='<div class="empty-state">✦<br><br>¡Se acabaron las 200 cartas!<br><br><button class="btn-reveal" onclick="buildDeck()">Barajar de nuevo</button></div>';
    acts.innerHTML=''; return;
  }
  if(!revealed){
    area.innerHTML=`
      <div class="card card-stack-2"></div>
      <div class="card card-stack-1"></div>
      <div class="card card-back" onclick="revealCard()">
        <img class="card-back-logo" src="${IMG_SRC}" alt="logo">
        <div class="card-back-text">Toca para revelar</div>
      </div>`;
    acts.innerHTML='<button class="btn-reveal" onclick="revealCard()">Revelar carta</button>';
  } else {
    area.innerHTML=`<div class="card card-front fade-in">
      <div class="card-header">
        <img class="card-logo-sm" src="${IMG_SRC}" alt="logo">
        <div class="category-badge cat-${current.cat}">${CAT_LABELS[current.cat]}</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-question">${current.q}</div>
    </div>`;
    acts.innerHTML=`<button class="btn-pass" onclick="nextCard(false)">Pasar</button>
      <button class="btn-check" onclick="nextCard(true)">✓ Respondí</button>`;
  }
  document.getElementById('filter-row').innerHTML=Object.keys(filters).map(cat=>
    `<button class="filter-btn ${filters[cat]?'on cat-'+cat:''}" onclick="toggleFilter('${cat}')">${CAT_LABELS[cat]}</button>`
  ).join('');
}
buildDeck();
</script>
