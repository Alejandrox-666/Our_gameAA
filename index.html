<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="Juego de cartas premium para parejas: 300 preguntas y retos para conectar, reír y atreverse.">
<meta property="og:title" content="NUESTRO JUEGO DE CARTAS — Juego Premium para Parejas">
<meta property="og:description" content="300 cartas: preguntas profundas, picantes, divertidas y retos exclusivos.">
<meta property="og:type" content="website">
<title>NUESTRO JUEGO DE CARTAS — Juego Premium para Parejas</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0f0f1a;
    --bg-secondary: #1a1a2e;
    --bg-card: #16213e;
    --gold: #D4AF37;
    --gold-light: #F3E5AB;
    --gold-dark: #997a00;
    --accent-purple: #9b59b6;
    --accent-pink: #e84393;
    --accent-blue: #3498db;
    --accent-green: #2ecc71;
    --accent-orange: #e67e22;
    --text-primary: #ffffff;
    --text-secondary: #b8b8d0;
    --text-muted: #6c6c8a;
    --shadow: 0 20px 40px rgba(0,0,0,0.4);
    --shadow-glow: 0 0 20px rgba(212, 175, 55, 0.3);
    --radius: 24px;
    --cat-recuerdo: #3498db;
    --cat-picante: #e84393;
    --cat-divertida: #f39c12;
    --cat-profunda: #9b59b6;
    --cat-reto: #e74c3c;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a15 100%);
    min-height: 100dvh;
    color: var(--text-primary);
    padding: 1.5rem 1rem 3rem;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><path fill="none" d="M20,20 L80,20 M20,40 L80,40 M20,60 L80,60 M20,80 L80,80 M40,20 L40,80 M60,20 L60,80" stroke="%23D4AF37" stroke-width="1"/><circle cx="50" cy="50" r="30" fill="none" stroke="%23D4AF37" stroke-width="0.5"/></svg>') repeat;
    pointer-events: none;
    z-index: 0;
  }
  main { max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }

  .skip { position: absolute; left: -9999px; }
  .skip:focus { left: 1rem; top: 1rem; background: var(--gold); color: #0a0a15; padding: .5rem 1rem; border-radius: 12px; z-index: 999; font-weight: 600; }

  /* Header Premium */
  .header { text-align: center; margin-bottom: 2rem; }
  .logo-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 1rem;
  }
  .header-logo {
    width: 85px;
    height: 85px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow), 0 0 30px rgba(212, 175, 55, 0.4);
    animation: float 3s ease-in-out infinite;
    position: relative;
  }
  .header-logo::after {
    content: '';
    position: absolute;
    top: -3px;
    left: -3px;
    right: -3px;
    bottom: -3px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 33px;
    z-index: -1;
    opacity: 0.5;
    filter: blur(5px);
  }
  .header-logo span {
    font-size: 42px;
    font-weight: 800;
    color: #0a0a15;
    letter-spacing: 3px;
    font-family: 'Cormorant Garamond', serif;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 1px;
    text-shadow: 0 2px 10px rgba(212,175,55,0.2);
  }
  .header .subtitle {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .header p {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 10px;
  }

  /* Scoreboard Premium */
  .scoreboard { display: flex; gap: 15px; margin-bottom: 1.5rem; }
  .score-card {
    flex: 1;
    border-radius: var(--radius);
    background: rgba(22, 33, 62, 0.8);
    backdrop-filter: blur(10px);
    padding: 1rem;
    text-align: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    border: 1px solid rgba(212, 175, 55, 0.2);
    box-shadow: var(--shadow);
  }
  .score-card.active {
    border: 1px solid var(--gold);
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(22, 33, 62, 0.9));
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
    transform: translateY(-3px);
  }
  .score-name {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .score-num {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-family: 'Cormorant Garamond', serif;
  }
  .score-card.active .score-name { color: var(--gold); }

  /* Turn Label */
  .turn-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 1rem;
    background: rgba(22, 33, 62, 0.8);
    backdrop-filter: blur(10px);
    display: inline-block;
    width: auto;
    margin-left: auto;
    margin-right: auto;
    padding: 8px 24px;
    border-radius: 99px;
    border: 1px solid rgba(212, 175, 55, 0.3);
  }
  .turn-label span {
    color: var(--gold);
    font-weight: 800;
  }

  /* Timer Premium */
  .timer-container {
    background: rgba(22, 33, 62, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 99px;
    padding: 4px;
    margin-bottom: 1rem;
    border: 1px solid rgba(212, 175, 55, 0.3);
    overflow: hidden;
  }
  .timer-bar {
    height: 8px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 99px;
    width: 100%;
    transition: width 0.3s linear;
    position: relative;
    overflow: hidden;
  }
  .timer-bar::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .timer-text {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-top: 8px;
    font-family: monospace;
    letter-spacing: 2px;
  }
  .timer-warning {
    color: #ff6b6b;
    text-shadow: 0 0 10px #ff6b6b;
    animation: pulse 0.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.05); }
  }

  /* Filters */
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
  .filter-btn {
    font-size: 11px;
    padding: 8px 18px;
    border-radius: 99px;
    border: 1px solid rgba(212, 175, 55, 0.3);
    background: rgba(22, 33, 62, 0.8);
    backdrop-filter: blur(5px);
    color: var(--text-secondary);
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    transition: all 0.2s ease;
  }
  .filter-btn:hover { border-color: var(--gold); transform: translateY(-2px); }
  .filter-btn[aria-pressed="true"] {
    background: var(--cat-recuerdo);
    border-color: transparent;
    color: white;
    box-shadow: 0 0 15px rgba(52,152,219,0.5);
  }
  .filter-btn[aria-pressed="true"][data-cat="recuerdo"] { background: var(--cat-recuerdo); }
  .filter-btn[aria-pressed="true"][data-cat="picante"] { background: var(--cat-picante); }
  .filter-btn[aria-pressed="true"][data-cat="divertida"] { background: var(--cat-divertida); }
  .filter-btn[aria-pressed="true"][data-cat="profunda"] { background: var(--cat-profunda); }
  .filter-btn[aria-pressed="true"][data-cat="reto"] { background: var(--cat-reto); }
  .filter-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Deck Area */
  .deck-area {
    position: relative;
    height: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
    perspective: 2000px;
  }
  .card {
    width: min(340px, 88vw);
    height: 320px;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--bg-card), #0f0f1a);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    position: absolute;
    transition: all 0.3s ease;
    box-shadow: var(--shadow);
    border: 1px solid rgba(212, 175, 55, 0.3);
    backdrop-filter: blur(10px);
  }
  .card-stack-2 {
    transform: rotate(-8deg) translateY(10px);
    background: linear-gradient(135deg, #0f0f1a, #0a0a15);
    opacity: 0.8;
  }
  .card-stack-1 {
    transform: rotate(-4deg) translateY(5px);
    background: linear-gradient(135deg, #13132a, #0d0d1a);
    opacity: 0.9;
  }

  .flipper {
    width: min(340px, 88vw);
    height: 320px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .flipper.flipped { transform: rotateY(180deg); }
  .flipper .card { backface-visibility: hidden; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
  .flipper .card-front { transform: rotateY(180deg); }

  .card-back {
    cursor: pointer;
    background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
    border: 2px solid rgba(212, 175, 55, 0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }
  .card-back:hover {
    transform: scale(1.02);
    box-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
    border-color: var(--gold);
  }
  .card-back-logo {
    width: 90px;
    height: 90px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    animation: pulse-glow 2s infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
    50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.8); }
  }
  .card-back-logo span {
    font-size: 46px;
    font-weight: 800;
    color: #0a0a15;
    letter-spacing: 4px;
    font-family: 'Cormorant Garamond', serif;
  }
  .card-back-text {
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    margin-top: 10px;
  }

  .card-header { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 20px; }
  .category-badge {
    font-size: 10px;
    font-weight: 800;
    padding: 8px 20px;
    border-radius: 99px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: white;
  }
  .cat-recuerdo { background: var(--cat-recuerdo); box-shadow: 0 0 15px rgba(52,152,219,0.5); }
  .cat-picante { background: var(--cat-picante); box-shadow: 0 0 15px rgba(232,67,147,0.5); }
  .cat-divertida { background: var(--cat-divertida); box-shadow: 0 0 15px rgba(243,156,18,0.5); }
  .cat-profunda { background: var(--cat-profunda); box-shadow: 0 0 15px rgba(155,89,182,0.5); }
  .cat-reto { background: var(--cat-reto); box-shadow: 0 0 15px rgba(231,76,60,0.5); }

  .card-divider {
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: 20px;
  }
  .card-question {
    font-size: 17px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.6;
    font-family: 'Cormorant Garamond', serif;
  }

  .remaining {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 1rem;
    letter-spacing: 1px;
    background: rgba(22, 33, 62, 0.8);
    backdrop-filter: blur(5px);
    display: inline-block;
    width: auto;
    margin-left: auto;
    margin-right: auto;
    padding: 6px 18px;
    border-radius: 99px;
  }

  .actions { display: flex; gap: 12px; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .btn {
    border-radius: 99px;
    padding: 12px 28px;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
    border: none;
    transition: all 0.2s ease;
    min-height: 44px;
  }
  .btn:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.05); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #0a0a15;
    box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
  }
  .btn-check {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    color: white;
  }
  .btn-secondary {
    background: rgba(22, 33, 62, 0.9);
    backdrop-filter: blur(5px);
    color: var(--text-primary);
    border: 1px solid rgba(212, 175, 55, 0.3);
  }

  .toolbar { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 1rem; }
  .toolbar .btn { padding: 8px 16px; font-size: 10px; min-height: 36px; background: rgba(22, 33, 62, 0.9); backdrop-filter: blur(5px); }

  .empty-state {
    text-align: center;
    color: var(--text-secondary);
    padding: 2rem;
    background: rgba(22, 33, 62, 0.9);
    backdrop-filter: blur(10px);
    border-radius: var(--radius);
    border: 1px solid rgba(212, 175, 55, 0.3);
  }
  .ornament {
    color: var(--gold);
    font-size: 18px;
    letter-spacing: 8px;
    text-align: center;
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  dialog {
    background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
    color: var(--text-primary);
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    padding: 2rem;
    max-width: 90vw;
    width: 400px;
    box-shadow: var(--shadow);
  }
  dialog::backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
  dialog h2 {
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    text-align: center;
    font-weight: 700;
  }
  dialog label {
    display: block;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  dialog input, dialog select, dialog textarea {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    background: rgba(15, 15, 26, 0.8);
    border: 1px solid rgba(212, 175, 55, 0.3);
    color: var(--text-primary);
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    margin-bottom: 1rem;
  }
  dialog input:focus, dialog select:focus, dialog textarea:focus {
    outline: none;
    border-color: var(--gold);
  }
  dialog textarea { min-height: 100px; resize: vertical; }
  dialog .row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 1rem; }

  .timer-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
    border: 1px solid var(--gold);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    font-size: 20px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.2s;
    z-index: 100;
    color: var(--gold);
  }
  .timer-toggle:hover { transform: scale(1.1); border-color: var(--gold-light); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
    .flipper { transition: none; }
  }
</style>
</head>
<body>

<a href="#main" class="skip">Saltar al contenido</a>

<main id="main">
  <header class="header">
    <div class="logo-container">
      <div class="header-logo">
        <span>❤️</span>
      </div>
    </div>
    <h1>NUESTRO JUEGO DE CARTAS</h1>
    <div class="subtitle">✦ CONTIGO FOREVER ✦</div>
    <p><span id="total-count">300</span> cartas · momentos inolvidables</p>
  </header>

  <div class="ornament" aria-hidden="true">✦ ─── ✧ ─── ✦ ─── ✧ ─── ✦</div>

  <section class="scoreboard" aria-label="Marcador">
    <button class="score-card" id="card-p1" type="button">
      <div class="score-name" id="name-p1">Alejandro</div>
      <div class="score-num" id="score-p1" aria-live="polite">0</div>
    </button>
    <button class="score-card" id="card-p2" type="button">
      <div class="score-name" id="name-p2">Alejandra</div>
      <div class="score-num" id="score-p2" aria-live="polite">0</div>
    </button>
  </section>

  <div class="timer-container">
    <div class="timer-bar" id="timer-bar" style="width: 100%"></div>
    <div class="timer-text" id="timer-text">⏱️ 60 SEGUNDOS</div>
  </div>

  <p class="turn-label" aria-live="polite">🎴 TURNO DE: <span id="turn-name">Alejandro</span></p>

  <div class="filter-row" id="filter-row" role="group" aria-label="Filtrar categorías"></div>

  <div class="deck-area" id="deck-area" aria-live="polite"></div>
  <p class="remaining" id="remaining"></p>
  <div class="actions" id="actions"></div>

  <div class="toolbar">
    <button class="btn btn-secondary" id="btn-prev" type="button">↶ ANTERIOR</button>
    <button class="btn btn-secondary" id="btn-add" type="button">✧ AÑADIR CARTA</button>
    <button class="btn btn-secondary" id="btn-reset" type="button">⟳ REINICIAR</button>
    <button class="btn btn-secondary" id="btn-mute" type="button">🔊 SONIDO</button>
  </div>
</main>

<button class="timer-toggle" id="timer-toggle" title="Activar/Desactivar temporizador">⏱️</button>

<dialog id="dlg-name">
  <form method="dialog">
    <h2>✧ EDITAR NOMBRE ✧</h2>
    <label for="name-input">Nombre del jugador</label>
    <input id="name-input" maxlength="20" required>
    <div class="row">
      <button class="btn btn-secondary" value="cancel" type="submit">CANCELAR</button>
      <button class="btn btn-primary" value="ok" type="submit">GUARDAR</button>
    </div>
  </form>
</dialog>

<dialog id="dlg-add">
  <form method="dialog">
    <h2>✧ NUEVA CARTA ✧</h2>
    <label for="cat-input">Categoría</label>
    <select id="cat-input">
      <option value="recuerdo">Recuerdo</option>
      <option value="picante">Picante</option>
      <option value="divertida">Divertida</option>
      <option value="profunda">Profunda</option>
      <option value="reto">Reto 🔥</option>
    </select>
    <label for="q-input">Pregunta o Reto</label>
    <textarea id="q-input" maxlength="280" required placeholder="Escribe tu pregunta o reto personalizado..."></textarea>
    <div class="row">
      <button class="btn btn-secondary" value="cancel" type="submit">CANCELAR</button>
      <button class="btn btn-primary" value="ok" type="submit">AÑADIR</button>
    </div>
  </form>
</dialog>

<script>
(function() {
  'use strict';

  const RETOS = [
    {cat:'reto',q:'Dame un beso donde más te guste de mi cuerpo'},
    {cat:'reto',q:'Cuéntame tu fantasía más secreta'},
    {cat:'reto',q:'Quítame una prenda con los dientes'},
    {cat:'reto',q:'Baila pegadito a mí por 30 segundos'},
    {cat:'reto',q:'Susúrrame algo al oído que me ponga rojo/a'},
    {cat:'reto',q:'Hazme un masaje en los hombros por 1 minuto'},
    {cat:'reto',q:'Dame un beso en el cuello muy despacio'},
    {cat:'reto',q:'Cuéntame qué harías si estuviéramos solos ahora mismo'},
    {cat:'reto',q:'Muerde suavemente mi labio inferior'},

    {cat:'profunda',q:'¿Hay algo que hayas sacrificado por esta relación y que no me has contado?'},
    {cat:'profunda',q:'¿Cuándo sientes que nuestra comunicación es mejor y cuándo más difícil?'},
    {cat:'profunda',q:'¿Qué es lo que más te hace sentir seguro(a) en nuestra relación?'},
    {cat:'profunda',q:'¿Cuál es el proyecto de vida que más quieres compartir conmigo?'},
    {cat:'profunda',q:'¿Qué cosa de nuestra relación crees que nos hace únicos?'},
    {cat:'profunda',q:'¿Hay algo que hayas aprendido de tus relaciones anteriores que aplicas con nosotros?'},
    {cat:'profunda',q:'¿Cuál es la conversación más difícil que hemos tenido y cómo crees que nos afectó?'},
    {cat:'profunda',q:'¿Qué parte de mi forma de ser te ha ayudado a crecer?'},
    {cat:'profunda',q:'¿Cuándo sientes que soy tu mejor versión gracias a ti?'},
    {cat:'profunda',q:'¿Hay algo que no me hayas dicho por miedo a herirme?'},
    {cat:'profunda',q:'¿Qué crees que le falta a nuestra relación para ser aún más fuerte?'},
    {cat:'profunda',q:'¿Cuál es el mayor reto que crees que enfrentaremos en el futuro?'},
    {cat:'profunda',q:'¿Qué quieres que las personas que nos conocen digan de nosotros como pareja?'},
    {cat:'profunda',q:'¿Hay algo que ya perdonaste pero que aún te cuesta soltar?'},
    {cat:'profunda',q:'¿Cuál es la forma en que más demuestro mi amor sin palabras?'},
    {cat:'profunda',q:'¿Qué hábito o rutina nuestra sientes que nos une más?'},
    {cat:'profunda',q:'¿Cuál es la cosa más valiente que me has visto hacer?'},
    {cat:'profunda',q:'¿Cuándo sientes que eres completamente tú mismo(a) conmigo?'},
    {cat:'profunda',q:'¿Qué le pedirías al universo para nuestra relación si pudieras?'},
    {cat:'profunda',q:'¿Hay algo de mi personalidad que al principio no entendías y ahora amas?'},
    {cat:'profunda',q:'¿Cuál es la forma en que más quieres que te recuerde dentro de 20 años?'},
    {cat:'profunda',q:'¿Qué crees que nos unió en el momento más importante?'},
    {cat:'profunda',q:'¿Cuál es la promesa tácita que sientes que nos hacemos todos los días?'},
    {cat:'profunda',q:'¿Qué parte de ti sientes que he ayudado a sanar?'},
    {cat:'profunda',q:'¿Hay una meta que tienes y que nunca me has contado del todo?'},
    {cat:'profunda',q:'¿Cuándo fue la última vez que me viste y sentiste que te había ido bien en la vida?'},
    {cat:'profunda',q:'¿Qué cosa de nuestra convivencia diaria te hace más feliz?'},
    {cat:'profunda',q:'¿Cuál es el legado que quieres dejar juntos como pareja?'},
    {cat:'profunda',q:'¿Hay algo que solo yo sé de ti y que te alegra que sea así?'},
    {cat:'profunda',q:'¿Qué significa para ti que sigamos eligiéndonos todos los días?'}
  ];

  const ALL_BASE_CARDS = [...DEFAULT_CARDS, ...RETOS];
  const CAT_LABELS = { recuerdo:'RECUERDOS', picante:'PICANTE', divertida:'DIVERTIDA', profunda:'PROFUNDA', reto:'RETOS 🔥' };
  const STORAGE_KEY = 'cartas-aleja-v5';

  const state = {
    names: ['Alejandro', 'Alejandra'],
    scores: [0, 0],
    turn: 0,
    filters: { recuerdo: true, picante: true, divertida: true, profunda: true, reto: true },
    custom: [],
    deck: [],
    current: null,
    history: [],
    revealed: false,
    muted: false,
    timerEnabled: true
  };

  let timerInterval = null;
  let timeLeft = 60;
  let audioCtx = null;

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        names: state.names, scores: state.scores, turn: state.turn,
        filters: state.filters, custom: state.custom, muted: state.muted,
        timerEnabled: state.timerEnabled
      }));
    } catch(e) {}
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      state.names = d.names || state.names;
      state.scores = d.scores || state.scores;
      state.turn = d.turn ?? 0;
      state.filters = d.filters || state.filters;
      state.custom = d.custom || [];
      state.muted = !!d.muted;
      state.timerEnabled = d.timerEnabled !== undefined ? d.timerEnabled : true;
    } catch(e) {}
  }

  function allCards() { return [...ALL_BASE_CARDS, ...state.custom]; }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function playBeep(freq = 600, dur = 80) {
    if (state.muted) return;
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.frequency.value = freq;
      o.type = 'sine';
      g.gain.value = 0.1;
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur / 1000);
      o.stop(audioCtx.currentTime + dur / 1000);
    } catch(e) {}
    if (navigator.vibrate) navigator.vibrate(20);
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function updateTimerDisplay() {
    const bar = document.getElementById('timer-bar');
    const text = document.getElementById('timer-text');
    if (!bar || !text) return;
    const percentage = (timeLeft / 60) * 100;
    bar.style.width = percentage + '%';
    text.textContent = `⏱️ ${timeLeft} SEGUNDOS`;
    if (timeLeft <= 10) {
      text.classList.add('timer-warning');
    } else {
      text.classList.remove('timer-warning');
    }
  }

  function startTimer() {
    stopTimer();
    if (!state.timerEnabled) return;
    if (!state.revealed) return;
    
    timeLeft = 60;
    updateTimerDisplay();
    
    timerInterval = setInterval(() => {
      if (!state.revealed) {
        stopTimer();
        return;
      }
      if (timeLeft > 0) {
        timeLeft--;
        updateTimerDisplay();
        
        if (timeLeft === 10 && !state.muted) {
          playBeep(800, 150);
        }
        
        if (timeLeft === 0) {
          stopTimer();
          if (state.revealed) {
            playBeep(400, 200);
            nextCard(false);
          }
        }
      } else {
        stopTimer();
      }
    }, 1000);
  }

  function buildDeck() {
    stopTimer();
    state.deck = shuffle(allCards().filter(c => state.filters[c.cat]));
    state.current = null;
    state.revealed = false;
    state.history = [];
    render();
    save();
  }

  function revealCard() {
    if (state.revealed || state.deck.length === 0) return;
    state.current = state.deck.pop();
    state.revealed = true;
    playBeep(700, 80);
    render();
    startTimer();
  }

  function nextCard(scored) {
    stopTimer();
    if (scored) {
      state.scores[state.turn]++;
      playBeep(900, 100);
    }
    if (state.current) state.history.push(state.current);
    state.turn = (state.turn + 1) % 2;
    state.current = null;
    state.revealed = false;
    render();
    save();
  }

  function prevCard() {
    if (state.history.length === 0) return;
    stopTimer();
    if (state.current) state.deck.push(state.current);
    state.current = state.history.pop();
    state.revealed = true;
    state.turn = (state.turn + 1) % 2;
    render();
    startTimer();
  }

  function toggleFilter(cat) {
    const onCount = Object.values(state.filters).filter(Boolean).length;
    if (state.filters[cat] && onCount === 1) return;
    state.filters[cat] = !state.filters[cat];
    buildDeck();
    save();
  }

  function resetGame() {
    if (!confirm('¿Reiniciar puntajes y mazo?')) return;
    stopTimer();
    state.scores = [0, 0];
    state.turn = 0;
    state.revealed = false;
    state.current = null;
    state.history = [];
    buildDeck();
    save();
  }

  function toggleTimer() {
    state.timerEnabled = !state.timerEnabled;
    const toggleBtn = document.getElementById('timer-toggle');
    if (toggleBtn) toggleBtn.style.opacity = state.timerEnabled ? '1' : '0.5';
    if (!state.timerEnabled) {
      stopTimer();
      timeLeft = 60;
      updateTimerDisplay();
    } else if (state.revealed) {
      startTimer();
    }
    save();
  }

  function renderFilters() {
    const row = document.getElementById('filter-row');
    if (!row) return;
    row.innerHTML = '';
    const onCount = Object.values(state.filters).filter(Boolean).length;
    for (const cat of Object.keys(CAT_LABELS)) {
      const isOn = state.filters[cat];
      const onlyOne = isOn && onCount === 1;
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.setAttribute('data-cat', cat);
      btn.setAttribute('aria-pressed', String(isOn));
      if (onlyOne) btn.disabled = true;
      btn.title = onlyOne ? 'Debe quedar al menos una categoría' : '';
      btn.textContent = CAT_LABELS[cat];
      btn.onclick = () => toggleFilter(cat);
      row.appendChild(btn);
    }
  }

  function render() {
    document.getElementById('total-count').textContent = allCards().length;
    document.getElementById('name-p1').textContent = state.names[0];
    document.getElementById('name-p2').textContent = state.names[1];
    document.getElementById('score-p1').textContent = state.scores[0];
    document.getElementById('score-p2').textContent = state.scores[1];
    document.getElementById('turn-name').textContent = state.names[state.turn];
    
    const cardP1 = document.getElementById('card-p1');
    const cardP2 = document.getElementById('card-p2');
    if (cardP1) cardP1.className = 'score-card' + (state.turn === 0 ? ' active' : '');
    if (cardP2) cardP2.className = 'score-card' + (state.turn === 1 ? ' active' : '');

    renderFilters();

    const total = state.deck.length + (state.current ? 1 : 0);
    const remainingEl = document.getElementById('remaining');
    if (remainingEl) {
      remainingEl.textContent = `🎴 ${total} CARTA${total === 1 ? '' : 'S'} RESTANTE${total === 1 ? '' : 'S'} DE ${allCards().length} 🎴`;
    }

    const btnPrev = document.getElementById('btn-prev');
    if (btnPrev) btnPrev.disabled = state.history.length === 0;

    const area = document.getElementById('deck-area');
    const acts = document.getElementById('actions');
    if (!area || !acts) return;
    area.innerHTML = '';
    acts.innerHTML = '';

    if (!state.revealed && total === 0) {
      area.innerHTML = `
        <div class="empty-state">
          <div style="font-size: 48px; margin-bottom: 16px;">🎴✨</div>
          <div style="font-weight: 600; margin-bottom: 16px;">¡SE ACABARON LAS CARTAS!</div>
          <button class="btn btn-primary" onclick="window.buildDeck && buildDeck()">BARAJAR DE NUEVO</button>
        </div>
      `;
      return;
    }

    if (state.deck.length >= 2) {
      const stack2 = document.createElement('div');
      stack2.className = 'card card-stack-2';
      stack2.setAttribute('aria-hidden', 'true');
      area.appendChild(stack2);
    }
    if (state.deck.length >= 1) {
      const stack1 = document.createElement('div');
      stack1.className = 'card card-stack-1';
      stack1.setAttribute('aria-hidden', 'true');
      area.appendChild(stack1);
    }

    const flipper = document.createElement('div');
    flipper.className = 'flipper' + (state.revealed ? ' flipped' : '');

    const back = document.createElement('div');
    back.className = 'card card-back';
    back.setAttribute('role', 'button');
    if (!state.revealed) back.setAttribute('tabindex', '0');
    back.setAttribute('aria-label', 'Revelar carta');
    back.onclick = revealCard;
    back.onkeydown = (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        revealCard();
      }
    };
    back.innerHTML = `
      <div class="card-back-logo">
        <span>❤️</span>
      </div>
      <div class="card-back-text">TOCA PARA REVELAR</div>
      <div style="margin-top: 12px; font-size: 20px;">✨</div>
    `;
    flipper.appendChild(back);

    if (state.current) {
      const front = document.createElement('div');
      front.className = 'card card-front';
      const prefix = state.current.cat === 'reto' ? '🔥 RETO: ' : '';
      front.innerHTML = `
        <div class="card-header">
          <span class="category-badge cat-${state.current.cat}">${CAT_LABELS[state.current.cat]}</span>
        </div>
        <div class="card-divider" aria-hidden="true"></div>
        <p class="card-question">${prefix}${escapeHtml(state.current.q)}</p>
      `;
      flipper.appendChild(front);
    }

    area.appendChild(flipper);

    if (!state.revealed) {
      const revealBtn = document.createElement('button');
      revealBtn.className = 'btn btn-primary';
      revealBtn.textContent = '✨ REVELAR CARTA ✨';
      revealBtn.onclick = revealCard;
      acts.appendChild(revealBtn);
    } else {
      const passBtn = document.createElement('button');
      passBtn.className = 'btn btn-secondary';
      passBtn.textContent = '↺ PASAR';
      passBtn.onclick = () => nextCard(false);
      acts.appendChild(passBtn);
      
      const answerBtn = document.createElement('button');
      answerBtn.className = 'btn btn-check';
      answerBtn.textContent = '✓ RESPONDIDA +1';
      answerBtn.onclick = () => nextCard(true);
      acts.appendChild(answerBtn);
      
      if (navigator.share) {
        const shareBtn = document.createElement('button');
        shareBtn.className = 'btn btn-secondary';
        shareBtn.textContent = '↗ COMPARTIR';
        shareBtn.onclick = () => navigator.share({ 
          text: state.current.q, 
          title: 'Carta — ' + CAT_LABELS[state.current.cat] 
        }).catch(() => {});
        acts.appendChild(shareBtn);
      }
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function editName(idx) {
    const dlg = document.getElementById('dlg-name');
    const input = document.getElementById('name-input');
    if (!dlg || !input) return;
    input.value = state.names[idx];
    dlg.showModal();
    input.focus();
    input.select();
    
    const handler = () => {
      dlg.removeEventListener('close', handler);
      if (dlg.returnValue === 'ok' && input.value.trim()) {
        state.names[idx] = input.value.trim().slice(0, 20);
        save();
        render();
      }
    };
    dlg.addEventListener('close', handler);
  }

  function addQuestion() {
    const dlg = document.getElementById('dlg-add');
    const q = document.getElementById('q-input');
    const c = document.getElementById('cat-input');
    if (!dlg || !q || !c) return;
    q.value = '';
    c.value = 'recuerdo';
    dlg.showModal();
    
    const handler = () => {
      dlg.removeEventListener('close', handler);
      if (dlg.returnValue === 'ok' && q.value.trim()) {
        state.custom.push({ cat: c.value, q: q.value.trim() });
        save();
        if (state.filters[c.value]) {
          state.deck.unshift(state.custom[state.custom.length - 1]);
        }
        render();
      }
    };
    dlg.addEventListener('close', handler);
  }

  load();
  buildDeck();

  window.buildDeck = buildDeck;
  window.revealCard = revealCard;
  window.nextCard = nextCard;
  window.prevCard = prevCard;

  document.getElementById('card-p1')?.addEventListener('click', () => editName(0));
  document.getElementById('card-p2')?.addEventListener('click', () => editName(1));
  document.getElementById('btn-prev')?.addEventListener('click', prevCard);
  document.getElementById('btn-add')?.addEventListener('click', addQuestion);
  document.getElementById('btn-reset')?.addEventListener('click', resetGame);
  document.getElementById('timer-toggle')?.addEventListener('click', toggleTimer);
  
  const btnMute = document.getElementById('btn-mute');
  function updateMute() {
    if (btnMute) {
      btnMute.textContent = state.muted ? '🔇 SONIDO' : '🔊 SONIDO';
      btnMute.setAttribute('aria-pressed', String(state.muted));
    }
  }
  updateMute();
  btnMute?.addEventListener('click', () => {
    state.muted = !state.muted;
    updateMute();
    save();
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.matches('input, textarea, select, dialog')) return;
    if ((e.key === ' ' || e.key === 'Enter') && !state.revealed && state.deck.length > 0) {
      e.preventDefault();
      revealCard();
    } else if (e.key === 'ArrowRight' && state.revealed) {
      nextCard(false);
    } else if (e.key === 'ArrowLeft') {
      prevCard();
    } else if ((e.key === 'c' || e.key === 'C') && state.revealed) {
      nextCard(true);
    }
  });

  const toggleBtn = document.getElementById('timer-toggle');
  if (toggleBtn) toggleBtn.style.opacity = state.timerEnabled ? '1' : '0.5';

  window.addEventListener('beforeunload', () => {
    if (timerInterval) clearInterval(timerInterval);
    if (audioCtx) audioCtx?.close();
  });
})();
</script>
</body>
</html>
