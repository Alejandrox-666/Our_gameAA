<style>

  html, body { height: 100%; }
  body {

  .header { text-align: center; margin-bottom: 1.5rem; }

  .header h1 {

  .header p {

  .scoreboard { display: flex; gap: 12px; margin-bottom: 1.25rem; }
  .score-card {
    flex: 1; border-radius: var(--radius);
    border: 1px solid var(--gold-dark);

    padding: .75rem 1rem; text-align: center;
    transition: all .3s ease;
    cursor: pointer;
    font: inherit; color: inherit;
  }
  .score-card.active {
    border: 2px solid var(--gold);
    background: rgba(201,149,42,.18);
    box-shadow: 0 0 18px rgba(201,149,42,.25);

  .score-name { font-size: 11px; color: var(--text-muted); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 4px; }
  .score-num { font-size: 26px; color: var(--gold-light); font-family: Georgia, serif; }
  .score-card.active .score-name { color: var(--gold); }

  .turn-label {
    font-size: 13px; color: var(--text-muted);
    text-align: center; margin-bottom: 1.25rem; letter-spacing: .05em;
  }
  .turn-label span { color: var(--gold-light); }

  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 1.25rem; }
  .filter-btn {
    font-size: 11px; padding: 6px 14px; border-radius: 99px;
    border: 1px solid var(--gold-dark);
    background: transparent; color: var(--text-muted);
    cursor: pointer; letter-spacing: .08em; text-transform: uppercase;
    font-family: 'Georgia', serif; transition: all .2s;
    min-height: 32px;
  }
  .filter-btn[aria-pressed="true"] { font-weight: 700; }
  .filter-btn[aria-pressed="true"][data-cat="recuerdo"]  { background: rgba(83,74,183,.25);  color: #b0a8f0; border-color: var(--cat-recuerdo); }
  .filter-btn[aria-pressed="true"][data-cat="picante"]   { background: rgba(212,83,126,.2);  color: #f0a0c0; border-color: var(--cat-picante); }
  .filter-btn[aria-pressed="true"][data-cat="divertida"] { background: rgba(186,117,23,.25); color: #f0c878; border-color: var(--cat-divertida); }
  .filter-btn[aria-pressed="true"][data-cat="profunda"]  { background: rgba(24,95,165,.25);  color: #90c0f0; border-color: var(--cat-profunda); }
  .filter-btn:disabled { opacity: .5; cursor: not-allowed; }

  .deck-area {
    position: relative; height: 300px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.25rem;
    perspective: 1200px;
  }
  .card {
    width: min(300px, 88vw); height: 280px;
    border-radius: var(--radius);
    border: 1px solid var(--gold-dark);
    background: var(--card-bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem; text-align: center;
    position: absolute;
    transition: transform .25s ease;
  }
  .card-stack-2 { transform: rotate(-4deg) translateY(6px); background: #0a1020; border-color: #6a5010; opacity: .8; }
  .card-stack-1 { transform: rotate(2.5deg) translateY(3px); background: #0c1222; border-color: #8B6514; opacity: .9; }

  .flipper { width: min(300px, 88vw); height: 280px; position: relative; transform-style: preserve-3d; transition: transform .6s; }
  .flipper.flipped { transform: rotateY(180deg); }
  .flipper .card { backface-visibility: hidden; }
  .flipper .card-front { transform: rotateY(180deg); }

  .card-back {
    cursor: pointer;
    border: 2px solid var(--gold-dark);
    background: radial-gradient(ellipse at center, #1a2540 0%, #0d1020 100%);
  }
  .card-back:hover { box-shadow: 0 0 24px rgba(201,149,42,.3); }
  .card-back-logo { width: 80px; height: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 8px rgba(201,149,42,.4)); }
  .card-back-text { font-size: 12px; color: var(--text-muted); letter-spacing: .15em; text-transform: uppercase; }

  .card-header { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 14px; }
  .category-badge {
    font-size: 10px; font-weight: 700; padding: 4px 12px;
    border-radius: 99px; letter-spacing: .12em; text-transform: uppercase;
  }
  .cat-recuerdo  { background: rgba(83,74,183,.25);  color: #b0a8f0; border: 1px solid var(--cat-recuerdo); }
  .cat-picante   { background: rgba(212,83,126,.2);  color: #f0a0c0; border: 1px solid var(--cat-picante); }
  .cat-divertida { background: rgba(186,117,23,.25); color: #f0c878; border: 1px solid var(--cat-divertida); }
  .cat-profunda  { background: rgba(24,95,165,.25); color: #90c0f0; border: 1px solid var(--cat-profunda); }

  .card-divider { width: 60%; height: 1px; background: var(--gold-dark); margin-bottom: 14px; opacity: .5; }
  .card-question { font-size: 15px; color: var(--text-light); line-height: 1.6; }

  .remaining { font-size: 11px; color: var(--text-muted); text-align: center; margin-bottom: 1rem; letter-spacing: .1em; }

  .actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .btn {
    border-radius: 99px; padding: 11px 22px; font-size: 13px;
    cursor: pointer; letter-spacing: .08em; text-transform: uppercase;
    font-family: 'Georgia', serif; border: 1px solid var(--gold-dark);
    background: transparent; color: var(--text-muted);
    transition: all .15s; min-height: 44px;
  }
  .btn:hover:not(:disabled) { border-color: var(--text-muted); color: var(--text-light); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #0a0f1e; border: none; font-weight: 700;
    padding: 11px 32px;
  }
  .btn-primary:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); color: #0a0f1e; }
  .btn-check { border-color: var(--gold); color: var(--gold-light); }
  .btn-check:hover:not(:disabled) { background: rgba(201,149,42,.15); color: var(--gold-light); }

  .toolbar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 1rem; }
  .toolbar .btn { padding: 8px 14px; font-size: 11px; min-height: 36px; }

  .empty-state { text-align: center; color: var(--text-muted); font-size: 15px; padding: 2rem; line-height: 1.8; }
  .ornament { color: var(--gold-dark); font-size: 18px; letter-spacing: .3em; text-align: center; margin-bottom: .5rem; opacity: .5; }

  /* Dialog */
  dialog {
    background: var(--card-bg); color: var(--text-light);
    border: 1px solid var(--gold-dark); border-radius: var(--radius);
    padding: 1.5rem; max-width: 90vw; width: 380px;
    font-family: Georgia, serif;
  }
  dialog::backdrop { background: rgba(0,0,0,.7); backdrop-filter: blur(4px); }
  dialog h2 { font-size: 16px; color: var(--gold-light); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 1rem; text-align: center; font-weight: 400; }
  dialog label { display: block; font-size: 11px; color: var(--text-muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
  dialog input, dialog select, dialog textarea {
    width: 100%; padding: 10px; border-radius: 8px;
    background: rgba(0,0,0,.3); border: 1px solid var(--gold-dark);
    color: var(--text-light); font-family: Georgia, serif; font-size: 14px;
    margin-bottom: 1rem;
  }
  dialog textarea { min-height: 80px; resize: vertical; }
  dialog .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: .5rem; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
    .flipper { transition: none; }
  }

  /* sr-only */
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>
</head>

</main>

<!-- Edit name dialog -->
<dialog id="dlg-name">
  <form method="dialog">
    <h2>Editar nombre</h2>
    <label for="name-input">Nombre del jugador</label>
    <input id="name-input" maxlength="20" required>
    <div class="row">
      <button class="btn" value="cancel" type="submit">Cancelar</button>
      <button class="btn btn-primary" value="ok" id="name-ok" type="submit">Guardar</button>
    </div>
  </form>
</dialog>

<!-- Add question dialog -->
<dialog id="dlg-add">
  <form method="dialog">
    <h2>Nueva pregunta</h2>
    <label for="cat-input">Categoría</label>
    <select id="cat-input">
      <option value="recuerdo">Recuerdo</option>
      <option value="picante">Picante</option>
      <option value="divertida">Divertida</option>
      <option value="profunda">Profunda</option>
    </select>
    <label for="q-input">Pregunta</label>
    <textarea id="q-input" maxlength="280" required></textarea>
    <div class="row">
      <button class="btn" value="cancel" type="submit">Cancelar</button>
      <button class="btn btn-primary" value="ok" id="add-ok" type="submit">Añadir</button>
    </div>
  </form>
</dialog>

const CAT_LABELS = { recuerdo:'Recuerdos', picante:'Picante', divertida:'Divertida', profunda:'Profunda' };
const STORAGE_KEY = 'cartas-aleja-v1';

// ---------- State ----------
const state = {
  names: ['Alejandro','Alejandra'],
  scores: [0,0],
  turn: 0,
  filters: { recuerdo:true, picante:true, divertida:true, profunda:true },
  custom: [],
  deck: [],
  current: null,
  history: [],
  revealed: false,
  muted: false,
};

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      names: state.names, scores: state.scores, turn: state.turn,
      filters: state.filters, custom: state.custom, muted: state.muted,
    }));
  } catch(e) {}
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    Object.assign(state, {
      names: d.names || state.names,
      scores: d.scores || state.scores,
      turn: d.turn ?? 0,
      filters: d.filters || state.filters,
      custom: d.custom || [],
      muted: !!d.muted,
    });
  } catch(e) {}
}

function allCards() { return DEFAULT_CARDS.concat(state.custom); }

// ---------- Utils ----------
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function beep(freq=600, dur=80) {
  if (state.muted) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.value = freq; o.type = 'sine';
    g.gain.value = .05;
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur/1000);
    setTimeout(() => ctx.close(), dur + 50);
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate(20);
}

// ---------- Game ----------
function buildDeck() {
  state.deck = shuffle(allCards().filter(c => state.filters[c.cat]));
  state.current = null;
  state.revealed = false;
  state.history = [];
  render();
}

function revealCard() {
  if (state.revealed || state.deck.length === 0) return;
  state.current = state.deck.pop();
  state.revealed = true;
  beep(700, 60);
  render(true);
}

function nextCard(scored) {
  if (scored) {
    state.scores[state.turn]++;
    beep(900, 100);
  }
  if (state.current) state.history.push(state.current);
  state.turn = (state.turn + 1) % 2;
  state.current = null;
  state.revealed = false;
  save();
  render();
}

function prevCard() {
  if (state.history.length === 0) return;
  if (state.current) state.deck.push(state.current);
  state.current = state.history.pop();
  state.revealed = true;
  state.turn = (state.turn + 1) % 2;
  render(true);
}

function toggleFilter(cat) {
  const onCount = Object.values(state.filters).filter(Boolean).length;
  if (state.filters[cat] && onCount === 1) return;
  state.filters[cat] = !state.filters[cat];
  buildDeck();
  save();
}

function resetGame() {
  if (!confirm('¿Reiniciar puntajes y mazo?')) return;
  state.scores = [0,0]; state.turn = 0;
  buildDeck();
  save();
}

// ---------- Render ----------
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (v === true) e.setAttribute(k,'');
    else if (v !== false && v != null) e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function renderFilters() {
  const row = document.getElementById('filter-row');
  row.innerHTML = '';
  const onCount = Object.values(state.filters).filter(Boolean).length;
  for (const cat of Object.keys(CAT_LABELS)) {
    const isOn = state.filters[cat];
    const onlyOne = isOn && onCount === 1;
    row.appendChild(el('button', {
      class: 'filter-btn',
      type: 'button',
      'data-cat': cat,
      'aria-pressed': String(isOn),
      disabled: onlyOne,
      title: onlyOne ? 'Debe quedar al menos una categoría' : '',
      onclick: () => toggleFilter(cat),
    }, CAT_LABELS[cat]));
  }
}

function render(flip = false) {
  document.getElementById('total-count').textContent = allCards().length;
  document.getElementById('name-p1').textContent = state.names[0];
  document.getElementById('name-p2').textContent = state.names[1];
  document.getElementById('score-p1').textContent = state.scores[0];
  document.getElementById('score-p2').textContent = state.scores[1];
  document.getElementById('turn-name').textContent = state.names[state.turn];
  document.getElementById('card-p1').className = 'score-card' + (state.turn === 0 ? ' active' : '');
  document.getElementById('card-p2').className = 'score-card' + (state.turn === 1 ? ' active' : '');

  renderFilters();

  const total = state.deck.length + (state.current ? 1 : 0);
  document.getElementById('remaining').textContent =
    `✦  ${total} carta${total === 1 ? '' : 's'} restante${total === 1 ? '' : 's'} de ${allCards().length}  ✦`;

  document.getElementById('btn-prev').disabled = state.history.length === 0;

  const area = document.getElementById('deck-area');
  const acts = document.getElementById('actions');
  area.innerHTML = ''; acts.innerHTML = '';

  if (!state.revealed && total === 0) {
    area.appendChild(el('div', { class: 'empty-state' },
      el('div', {}, '✦'),
      el('br'),
      el('div', {}, '¡Se acabaron las cartas!'),
      el('br'),
      el('button', { class: 'btn btn-primary', type: 'button', onclick: buildDeck }, 'Barajar de nuevo')
    ));
    return;
  }

  // Stack (decorative)
  if (state.deck.length >= 2) area.appendChild(el('div', { class: 'card card-stack-2', 'aria-hidden': 'true' }));
  if (state.deck.length >= 1) area.appendChild(el('div', { class: 'card card-stack-1', 'aria-hidden': 'true' }));

  // Flipper holds back and front
  const flipper = el('div', { class: 'flipper' + (state.revealed ? ' flipped' : '') });

  const back = el('div', {
    class: 'card card-back',
    role: 'button',
    tabindex: state.revealed ? '-1' : '0',
    'aria-label': 'Revelar carta',
    onclick: revealCard,
    onkeydown: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); revealCard(); } },
  });
  back.innerHTML = `
    <svg width="80" height="80" viewBox="0 0 64 64" aria-hidden="true" style="margin-bottom:10px;filter:drop-shadow(0 0 8px rgba(201,149,42,.4))">
      <defs><linearGradient id="gb" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E8C060"/><stop offset="1" stop-color="#8B6514"/></linearGradient></defs>
      <circle cx="32" cy="32" r="30" fill="none" stroke="url(#gb)" stroke-width="1.5"/>
      <path d="M32 48 C 18 38, 14 28, 22 22 C 27 19, 32 22, 32 28 C 32 22, 37 19, 42 22 C 50 28, 46 38, 32 48 Z" fill="url(#gb)" opacity=".9"/>
    </svg>
    <div class="card-back-text">Toca para revelar</div>`;
  flipper.appendChild(back);

  if (state.current) {
    const front = el('div', { class: 'card card-front' });
    const header = el('div', { class: 'card-header' },
      el('span', { class: 'category-badge cat-' + state.current.cat }, CAT_LABELS[state.current.cat])
    );
    front.appendChild(header);
    front.appendChild(el('div', { class: 'card-divider', 'aria-hidden': 'true' }));
    // textContent: XSS-safe
    front.appendChild(el('p', { class: 'card-question' }, state.current.q));
    flipper.appendChild(front);
  }

  area.appendChild(flipper);

  if (!state.revealed) {
    acts.appendChild(el('button', { class: 'btn btn-primary', type: 'button', onclick: revealCard }, 'Revelar carta'));
  } else {
    acts.appendChild(el('button', { class: 'btn', type: 'button', onclick: () => nextCard(false) }, 'Pasar'));
    acts.appendChild(el('button', { class: 'btn btn-check', type: 'button', onclick: () => nextCard(true) }, '✓ Respondida'));
    if (navigator.share) {
      acts.appendChild(el('button', {
        class: 'btn', type: 'button', 'aria-label': 'Compartir carta',
        onclick: () => navigator.share({ text: state.current.q, title: 'Carta — ' + CAT_LABELS[state.current.cat] }).catch(() => {}),
      }, '↗ Compartir'));
    }
  }
}

// ---------- Dialogs ----------
function editName(idx) {
  const dlg = document.getElementById('dlg-name');
  const input = document.getElementById('name-input');
  input.value = state.names[idx];
  dlg.showModal();
  input.focus(); input.select();
  dlg.addEventListener('close', function handler() {
    dlg.removeEventListener('close', handler);
    if (dlg.returnValue === 'ok' && input.value.trim()) {
      state.names[idx] = input.value.trim().slice(0, 20);
      save(); render();
    }
  });
}

function addQuestion() {
  const dlg = document.getElementById('dlg-add');
  const q = document.getElementById('q-input');
  const c = document.getElementById('cat-input');
  q.value = ''; c.value = 'recuerdo';
  dlg.showModal();
  dlg.addEventListener('close', function handler() {
    dlg.removeEventListener('close', handler);
    if (dlg.returnValue === 'ok' && q.value.trim()) {
      state.custom.push({ cat: c.value, q: q.value.trim() });
      save();
      // Insert into current deck if matching filter
      if (state.filters[c.value]) state.deck.unshift(state.custom[state.custom.length-1]);
      render();
    }
  });
}

// ---------- Wire up ----------
load();
buildDeck();

document.getElementById('card-p1').addEventListener('click', () => editName(0));
document.getElementById('card-p2').addEventListener('click', () => editName(1));
document.getElementById('btn-prev').addEventListener('click', prevCard);
document.getElementById('btn-add').addEventListener('click', addQuestion);
document.getElementById('btn-reset').addEventListener('click', resetGame);

const btnMute = document.getElementById('btn-mute');
function updateMute() {
  btnMute.textContent = state.muted ? '🔇 Sonido' : '🔊 Sonido';
  btnMute.setAttribute('aria-pressed', String(state.muted));
}
updateMute();
btnMute.addEventListener('click', () => { state.muted = !state.muted; updateMute(); save(); });

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea, select')) return;
  if (e.key === ' ' || e.key === 'Enter') {
    if (!state.revealed) { e.preventDefault(); revealCard(); }
  } else if (e.key === 'ArrowRight') { if (state.revealed) nextCard(false); }
  else if (e.key === 'ArrowLeft')  { prevCard(); }
  else if (e.key === 'c' || e.key === 'C') { if (state.revealed) nextCard(true); }
});
</script>
